<h2 mat-dialog-title>Confirm {{ data.decision }} Decision</h2>
<mat-dialog-content>
  <p>Add comments (optional):</p>
  <textarea [(ngModel)]="comments" rows="4" class="form-control"></textarea>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-button color="primary" (click)="onConfirm()">Confirm</button>
</mat-dialog-actions>
