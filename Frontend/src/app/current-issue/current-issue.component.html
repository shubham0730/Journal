<div class="container mx-auto p-6">
    <!-- Journal Header -->
    <div class="flex gap-6 mb-8">
      <div class="w-48">
        <img 
          [src]="journalCover" 
          alt="Journal Cover" 
          class="w-full shadow-lg"
        />
      </div>
      
      <div class="flex-1">
        <h1 class="text-2xl font-bold mb-4">{{ issueInfo }}</h1>
        
        <div class="space-y-3">
          <a href="#" class="flex items-center text-blue-600 hover:underline">
            <span class="mr-2">≡</span>
            Table of Contents Outline
          </a>
          
          <a href="#" class="flex items-center text-blue-600 hover:underline">
            <span class="mr-2">🔔</span>
            eTOC Alerts
          </a>
          
          <a href="#" class="flex items-center text-blue-600 hover:underline">
            <span class="mr-2">👥</span>
            Contributor Index
          </a>
        </div>
      </div>
    </div>

    <!-- Article Section -->
    <div class="bg-gray-100 p-4 rounded-lg mb-6">
      <div 
        class="flex items-center cursor-pointer"
        (click)="toggleArticle()"
      >
        <span class="mr-2">{{ article.isOpen ? '▼' : '▶' }}</span>
        <span class="text-lg">Review Article</span>
      </div>

      <div *ngIf="article.isOpen" class="mt-4">
        <h2 class="text-xl font-bold text-blue-700 mb-4">
          {{ article.title }}
        </h2>
        
        <p class="mb-4">
          {{ article.authors.join('; ') }}
          <a href="#" class="text-blue-600 ml-2">More</a>
        </p>
        
        <p class="italic mb-4">{{ article.journal }}. {{ article.citation }}</p>
        
        <div class="flex gap-4">
          <a href="#" class="text-blue-600 hover:underline flex items-center">
            <span class="mr-1">+</span> Abstract
          </a>
          <a href="#" class="text-blue-600 hover:underline flex items-center">
            <span class="mr-1">★</span> Favorite
          </a>
          <a href="#" class="text-blue-600 hover:underline">PDF</a>
          <a href="#" class="text-blue-600 hover:underline">Permissions</a>
        </div>

        <div class="mt-4">
          <span class="px-2 py-1 text-sm border border-gray-400 rounded">
            OPEN
          </span>
        </div>
      </div>
    </div>
  </div>
