<h2 mat-dialog-title>Session Timeout</h2>
<div mat-dialog-content class="dialog-content">
  <div class="timer-circle">{{ countdown }}</div>
  <p>Your session is about to expire. Do you want to stay connected?</p>
</div>
<div mat-dialog-actions>
  <button mat-button (click)="stayConnected()">Stay Connected</button>
  <button mat-button color="warn" (click)="logout()">Logout</button>
</div>
